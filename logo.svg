<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -18 360 172" role="img" aria-label="Geri's Glideria">
  <defs>
    <clipPath id="coneClip">
      <path d="M36 60 H104 L70 140 Z"/>
    </clipPath>
    <clipPath id="tipClip">
      <path d="M52 104 H88 L70 140 Z"/>
    </clipPath>
    <pattern id="strawStripe" width="8" height="8" patternTransform="rotate(38)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f3d9a6"/>
      <rect width="4" height="8" fill="#d9a24a"/>
    </pattern>
  </defs>

  <!-- Wordmark -->
  <text x="10" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="52" font-weight="700" fill="#1b1b1b">Geri&#8217;s</text>
  <text x="10" y="126" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="700" fill="#1b1b1b" text-anchor="start">&#1490;&#1500;&#1497;&#1491;&#1512;&#1497;&#1492;</text>

  <!-- Ice cream cone -->
  <g transform="translate(205,4)">
    <!-- straw -->
    <g transform="rotate(20 96 24)">
      <rect x="92" y="-14" width="8" height="52" rx="4" fill="url(#strawStripe)" stroke="#c9954f" stroke-width="1.2"/>
    </g>

    <!-- waffle cone -->
    <path d="M36 60 H104 L70 140 Z" fill="#f0d9a8" stroke="#dcbe86" stroke-width="2.5"/>
    <g clip-path="url(#coneClip)" stroke="#d3b06f" stroke-width="2" opacity="0.8">
      <path d="M20 66 L120 66 M14 84 L126 84 M10 102 L130 102 M20 120 L120 120"/>
      <path d="M52 55 L52 145 M66 55 L66 145 M80 55 L80 145 M94 55 L94 145" transform="skewX(-16)"/>
    </g>

    <!-- blue polka-dot tip -->
    <g clip-path="url(#tipClip)">
      <rect x="40" y="100" width="60" height="48" fill="#cdd9f4"/>
      <g fill="#a9c0ea">
        <circle cx="60" cy="112" r="3"/><circle cx="74" cy="110" r="3"/>
        <circle cx="66" cy="122" r="3"/><circle cx="78" cy="124" r="3"/>
        <circle cx="70" cy="134" r="2.6"/>
      </g>
    </g>

    <!-- pink scoop -->
    <g>
      <path d="M40 62 q-6 -2 -6 -12 q-14 -4 -10 -20 q-6 -14 8 -20 q2 -16 20 -16 q10 -10 24 -2 q18 -4 22 12 q14 6 8 22 q8 12 -4 20 q0 8 -8 10 q-30 6 -66 4 Z"
            fill="#f0a6c0"/>
      <ellipse cx="62" cy="20" rx="16" ry="11" fill="#f7c8d8" opacity="0.75"/>
      <circle cx="86" cy="34" r="7" fill="#f7c8d8" opacity="0.7"/>
      <!-- little drips over the rim -->
      <path d="M44 60 q-2 8 2 12 q6 -2 4 -12 Z" fill="#f0a6c0"/>
      <path d="M94 58 q4 6 1 12 q-6 -1 -5 -11 Z" fill="#f0a6c0"/>
    </g>
  </g>
</svg>
